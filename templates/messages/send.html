{% extends "base.html" %}

{% block title %}Enviar mensagem para {{ recipient.username }} - IAmSurfer{% endblock %}

{% block content %}
<div class="col-12 col-lg-6 mx-auto">

    <a href="{{ url_for('main.user_profile', username=recipient.username) }}"
        class="d-inline-flex align-items-center gap-1 mb-3 text-decoration-none"
        style="color:var(--text-secondary);font-size:.85rem;font-weight:600;"><i class="bi bi-arrow-left"></i> Voltar ao perfil</a>

    <div class="card">
        <div class="card-body p-4">
            <div class="d-flex align-items-center gap-2 mb-4">
                <img src="{{ recipient.profile_image_urls|profile_thumbnail_url if recipient.profile_image_urls else recipient.profile_image|img_url }}"
                    class="rounded-circle" width="44" height="44" style="object-fit:cover;">
                <div>
                    <div style="font-size:.78rem;color:var(--text-muted);">Nova mensagem para</div>
                    <div style="font-weight:700;">{{ recipient.username }}</div>
                </div>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <textarea class="form-control" id="content" name="content" rows="5"
                        placeholder="Escreva sua mensagem..." required></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill me-1"></i> Enviar</button>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
