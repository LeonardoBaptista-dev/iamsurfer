{% extends "base.html" %}

{% block title %}Nova Mensagem - IAmSurfer{% endblock %}

{% block content %}
<div class="col-12 col-lg-6 mx-auto">

    <a href="{{ url_for('messages.inbox') }}" class="d-inline-flex align-items-center gap-1 mb-3 text-decoration-none"
        style="color:var(--text-secondary);font-size:.85rem;font-weight:600;"><i class="bi bi-arrow-left"></i> Caixa de entrada</a>

    <h4 class="mb-4" style="font-weight:700;letter-spacing:-.3px;">Nova mensagem</h4>

    <div class="card">
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label for="recipient" class="form-label">Destinatário</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-at"></i></span>
                        <input type="text" class="form-control" id="recipient" name="recipient"
                            placeholder="Nome do usuário" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="content" class="form-label">Mensagem</label>
                    <textarea class="form-control" id="content" name="content" rows="5"
                        placeholder="Escreva sua mensagem..." required></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill me-1"></i> Enviar mensagem</button>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
