{% extends "base.html" %}

{% block title %}Editar Perfil - IAmSurfer{% endblock %}

{% block content %}
<div class="col-12 col-lg-7 mx-auto">

    <h4 class="mb-4" style="font-weight:700;letter-spacing:-.3px;">Editar perfil</h4>

    <form method="POST" action="{{ url_for('auth.edit_profile') }}" enctype="multipart/form-data">
        <div class="card mb-4">
            <div class="card-body p-4">
                <!-- Avatar -->
                <div class="d-flex align-items-center gap-4 mb-4 pb-4" style="border-bottom:1px solid var(--border);">
                    <img src="{{ current_user.profile_image_urls|profile_medium_url if current_user.profile_image_urls else current_user.profile_image|img_url }}"
                        class="rounded-circle" id="profile-preview"
                        style="width:90px;height:90px;object-fit:cover;border:2px solid var(--border);">
                    <div>
                        <div style="font-weight:700;font-size:1rem;">{{ current_user.username }}</div>
                        <label for="profile_image" class="btn btn-sm btn-outline-primary mt-2" style="cursor:pointer;">
                            <i class="bi bi-camera me-1"></i> Alterar foto
                        </label>
                        <input type="file" id="profile_image" name="profile_image" accept="image/*" class="d-none"
                            onchange="previewImage(this);">
                        <small class="text-muted d-block mt-1" style="font-size:.72rem;">JPG, PNG ou GIF — qualquer tamanho, otimizamos pra você</small>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Nome de usuário</label>
                    <input type="text" class="form-control" id="username" value="{{ current_user.username }}" disabled>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" value="{{ current_user.email }}" disabled>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label">Localização</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                        <input type="text" class="form-control" id="location" name="location"
                            value="{{ current_user.location or '' }}" placeholder="Ex: Florianópolis, SC">
                    </div>
                </div>

                <div class="mb-1">
                    <label for="bio" class="form-label">Biografia</label>
                    <textarea class="form-control" id="bio" name="bio" rows="4"
                        placeholder="Conte um pouco sobre você e sua relação com o surf...">{{ current_user.bio or '' }}</textarea>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mb-4">
            <a href="{{ url_for('main.user_profile', username=current_user.username) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar alterações</button>
        </div>
    </form>

    <!-- Trocar senha -->
    <form method="POST" action="{{ url_for('auth.change_password') }}">
        <div class="card mb-4">
            <div class="card-body p-4">
                <h6 class="mb-3" style="font-weight:700;"><i class="bi bi-shield-lock me-1"></i>Trocar senha</h6>
                <div class="mb-3">
                    <label for="current_password" class="form-label">Senha atual</label>
                    <input type="password" class="form-control" id="current_password" name="current_password"
                        autocomplete="current-password" required>
                </div>
                <div class="row g-3">
                    <div class="col-12 col-sm-6">
                        <label for="new_password" class="form-label">Nova senha</label>
                        <input type="password" class="form-control" id="new_password" name="new_password"
                            autocomplete="new-password" minlength="8" required>
                        <small class="text-muted" style="font-size:.72rem;">Mínimo 8 caracteres.</small>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label for="confirm_password" class="form-label">Confirmar nova senha</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                            autocomplete="new-password" minlength="8" required>
                    </div>
                </div>
                <div class="d-flex justify-content-end mt-3">
                    <button type="submit" class="btn btn-primary">Alterar senha</button>
                </div>
            </div>
        </div>
    </form>

</div>
{% endblock %}

{% block scripts %}
<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('profile-preview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
