services:
  web:
    build: .
    ports:
      - "5001:5000"
    volumes:
      - .:/app
      - uploads_data:/app/static/uploads
    environment:
      - FLASK_APP=app.py
      # 'development' aqui é o ambiente LOCAL deste compose (usa armazenamento
      # local de imagens). Em produção (Coolify/Hostinger) defina FLASK_ENV=production
      # e as credenciais do Cloudinary/DATABASE_URL via variáveis de ambiente seguras.
      - FLASK_ENV=development
      # Banco local do próprio compose (credenciais locais, não são segredo)
      - DATABASE_URL=postgresql://iamsurfer:iamsurfer@db/iamsurfer
      # Segredos NUNCA no compose: vêm do arquivo .env (não versionado).
      # Veja .env.example. Em produção, configure no painel do provedor.
      - SECRET_KEY=${SECRET_KEY:-dev-secret-trocar-em-producao}
    depends_on:
      - db
  
  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=iamsurfer
      - POSTGRES_USER=iamsurfer
      - POSTGRES_DB=iamsurfer
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  uploads_data: 